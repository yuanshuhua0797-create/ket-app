<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KET备考APP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'PingFang SC', system-ui, sans-serif; background: #F0F4FF; min-height: 100vh; }

    :root {
      --primary: #6C63FF;
      --secondary: #FF6584;
      --accent: #43E97B;
      --accent2: #F7971E;
      --text: #2D3748;
      --text-light: #718096;
      --card: #FFFFFF;
      --radius: 16px;
    }

    .top-nav {
      background: linear-gradient(135deg, var(--primary) 0%, #9B59B6 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-title { color: white; font-size: 18px; font-weight: 700; }
    .nav-user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar { font-size: 24px; }
    .user-stats { color: white; text-align: right; font-size: 13px; }
    .streak-badge { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 12px; font-weight: 600; }
    .logout-btn { color: white; background: rgba(255,255,255,0.15); border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }

    .app-container { max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

    .page { display: none; }
    .page.active { display: block; }

    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, #9B59B6 100%);
      padding: 24px 20px 40px;
      color: white;
      position: relative;
    }
    .hero-greeting { font-size: 14px; opacity: 0.85; margin-bottom: 4px; }
    .hero-name { font-size: 26px; font-weight: 800; margin-bottom: 16px; }
    .hero-progress-wrap { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 14px 16px; }
    .hero-progress-label { font-size: 12px; opacity: 0.85; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .progress-bar { height: 10px; background: rgba(255,255,255,0.25); border-radius: 5px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #43E97B, #38F9D7); border-radius: 5px; transition: width 0.6s ease; }

    .home-content { padding: 40px 16px 16px; }

    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--text); }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border-radius: var(--radius); padding: 14px 10px; text-align: center; box-shadow: 0 4px 20px rgba(108,99,255,0.12); }
    .stat-icon { font-size: 24px; margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 11px; color: var(--text-light); margin-top: 2px; }

    .module-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
    .module-card { background: var(--card); border-radius: var(--radius); padding: 18px 14px; box-shadow: 0 4px 20px rgba(108,99,255,0.12); cursor: pointer; transition: transform 0.2s; text-align: center; }
    .module-card:hover { transform: translateY(-4px); }
    .module-icon { font-size: 36px; margin-bottom: 8px; }
    .module-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .module-desc { font-size: 11px; color: var(--text-light); margin-top: 4px; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 8px 0 12px;
      box-shadow: 0 -2px 20px rgba(0,0,0,0.08);
      z-index: 100;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 16px; }
    .nav-icon { font-size: 22px; opacity: 0.6; }
    .nav-label { font-size: 11px; color: var(--text-light); }
    .nav-item.active .nav-icon { opacity: 1; }
    .nav-item.active .nav-label { color: var(--primary); font-weight: 700; }

    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(44,44,60,0.92);
      color: white;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Module Pages */
    .module-header {
      background: linear-gradient(135deg, var(--primary) 0%, #9B59B6 100%);
      padding: 20px;
      color: white;
    }
    .module-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .module-back { color: white; text-decoration: none; font-size: 14px; cursor: pointer; opacity: 0.9; }
    .module-content { padding: 20px 16px; }

    /* Pagination */
    .pagination {
      display: flex; justify-content: center; gap: 10px; margin: 20px 0;
    }
    .page-btn {
      padding: 8px 16px; border: 1px solid #E2E8F0; border-radius: 8px;
      background: white; cursor: pointer; font-size: 13px; transition: all 0.2s;
    }
    .page-btn:hover { border-color: var(--primary); }
    .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .page-info { 
      padding: 8px 16px; background: var(--primary); color: white;
      border-radius: 8px; font-size: 13px; font-weight: 600;
    }

    /* Vocab Module */
    .vocab-filter {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 16px;
      scrollbar-width: none;
    }
    .vocab-filter::-webkit-scrollbar { display: none; }
    .filter-chip {
      padding: 8px 16px; background: #E2E8F0; border-radius: 20px; font-size: 13px; cursor: pointer;
      white-space: nowrap; transition: all 0.2s;
    }
    .filter-chip.active { background: var(--primary); color: white; }
    .flashcard {
      background: white; border-radius: 20px; padding: 30px 24px; text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1); margin-bottom: 20px; cursor: pointer;
      perspective: 1000px; height: 240px; display: flex; flex-direction: column; justify-content: center;
    }
    .word { font-size: 32px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .phonetic { font-size: 16px; color: var(--text-light); margin-bottom: 12px; }
    .example { font-size: 14px; color: var(--text-light); line-height: 1.5; }
    .translation { font-size: 28px; font-weight: 700; color: var(--primary); margin-top: 16px; }
    .word-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
    .speaker-btn { background: none; border: none; font-size: 28px; cursor: pointer; padding: 4px; opacity: 0.6; transition: opacity 0.2s; }
    .speaker-btn:hover { opacity: 1; }
    .rating-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    .rating-btn {
      padding: 12px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600;
      transition: transform 0.2s;
    }
    .rating-btn:active { transform: scale(0.95); }
    .rating-hard { background: #FED7D7; color: #C53030; }
    .rating-medium { background: #FEEBC8; color: #C05621; }
    .rating-easy { background: #C6F6D5; color: #276749; }

    /* Reading Module */
    .reading-section { background: white; border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-title { font-size: 16px; font-weight: 700; }
    .reading-text { font-size: 14px; line-height: 1.8; color: var(--text); margin-bottom: 16px; }
    .reading-option {
      padding: 12px 16px; border: 2px solid #E2E8F0; border-radius: 12px; margin-bottom: 10px;
      cursor: pointer; transition: all 0.2s; font-size: 14px;
    }
    .reading-option:hover { border-color: var(--primary); background: #F7FAFC; }
    .reading-option.selected { border-color: var(--primary); background: #EDF2F7; }
    .reading-option.correct { border-color: #43E97B; background: #C6F6D5; }
    .reading-option.wrong { border-color: #F56565; background: #FED7D7; }

    /* Listening Module */
    .audio-player {
      background: white; border-radius: 20px; padding: 24px; text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px;
    }
    .play-btn {
      width: 70px; height: 70px; border-radius: 50%; background: var(--primary); border: none;
      cursor: pointer; font-size: 24px; color: white; transition: transform 0.2s;
    }
    .play-btn:active { transform: scale(0.95); }
    .audio-script {
      background: white; border-radius: var(--radius); padding: 16px; margin-top: 16px;
      font-size: 14px; line-height: 1.8; color: var(--text-light); display: none;
    }
    .audio-script.show { display: block; }
    .toggle-script-btn {
      width: 100%; padding: 10px; border: 1px solid #E2E8F0; border-radius: 10px;
      background: #F7FAFC; cursor: pointer; font-size: 13px; margin-top: 12px;
    }

    /* Writing Module */
    .writing-prompt { background: white; border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
    .writing-area {
      width: 100%; min-height: 200px; padding: 16px; border: 2px solid #E2E8F0;
      border-radius: 12px; font-size: 14px; line-height: 1.8; resize: vertical;
    }
    .writing-area:focus { outline: none; border-color: var(--primary); }
    .word-count { text-align: right; font-size: 12px; color: var(--text-light); margin-top: 8px; }
    .reference-answer {
      background: #F7FAFC; border-radius: var(--radius); padding: 16px; margin-top: 20px;
      border-left: 4px solid var(--primary);
    }
    .reference-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--primary); }

    /* Progress Page */
    .progress-section { background: white; border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .skill-progress { display: flex; align-items: center; margin-bottom: 16px; }
    .skill-icon { font-size: 24px; width: 40px; }
    .skill-info { flex: 1; margin-left: 12px; }
    .skill-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .skill-bar { height: 8px; background: #EDF2F7; border-radius: 4px; overflow: hidden; }
    .skill-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #9B59B6); border-radius: 4px; }
    .skill-percent { font-size: 14px; font-weight: 700; color: var(--primary); }

    .activity-item {
      display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #EDF2F7;
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon { font-size: 20px; width: 36px; }
    .activity-info { flex: 1; margin-left: 10px; }
    .activity-text { font-size: 13px; color: var(--text); }
    .activity-time { font-size: 11px; color: var(--text-light); }
    .activity-xp { font-size: 13px; font-weight: 700; color: var(--accent); }
  </style>
</head>
<body>
  <div class="top-nav">
    <div class="nav-title">KET 备考</div>
    <div class="nav-user-info">
      <span class="user-stats">
        <span id="streakDisplay">🔥 0天</span>
      </span>
      <span class="user-avatar" id="navAvatar">😊</span>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="app-container">
    <!-- 首页 -->
    <div id="homePage" class="page active">
      <div class="hero">
        <div class="hero-greeting" id="greeting">早上好</div>
        <div class="hero-name" id="userName">用户</div>
        <div class="hero-progress-wrap">
          <div class="hero-progress-label">
            <span>KET 备考进度</span>
            <span id="overallProgress">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="home-content">
        <div class="section-title">今日学习</div>
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-icon">📖</div>
            <div class="stat-value" id="todayWords">0</div>
            <div class="stat-label">单词</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">⭐</div>
            <div class="stat-value" id="todayXP">0</div>
            <div class="stat-label">经验值</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-value" id="todayAccuracy">0%</div>
            <div class="stat-label">正确率</div>
          </div>
        </div>

        <div class="section-title">学习模块</div>
        <div class="module-grid">
          <div class="module-card" onclick="showModule('vocab')">
            <div class="module-icon">🔤</div>
            <div class="module-name">词汇</div>
            <div class="module-desc">KET 核心词汇</div>
          </div>
          <div class="module-card" onclick="showModule('reading')">
            <div class="module-icon">📖</div>
            <div class="module-name">阅读</div>
            <div class="module-desc">理解与练习</div>
          </div>
          <div class="module-card" onclick="showModule('listening')">
            <div class="module-icon">🎧</div>
            <div class="module-name">听力</div>
            <div class="module-desc">100套练习</div>
          </div>
          <div class="module-card" onclick="showModule('writing')">
            <div class="module-icon">✍️</div>
            <div class="module-name">写作</div>
            <div class="module-desc">邮件与短文</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 词汇页面 -->
    <div id="vocabPage" class="page">
      <div class="module-header">
        <div class="module-back" onclick="goHome()">← 返回首页</div>
        <div class="module-title">词汇学习</div>
      </div>
      <div class="module-content">
        <div class="vocab-filter" id="vocabFilter"></div>
        <div class="flashcard" id="flashcard" onclick="flipCard()">
          <div class="word-row">
            <div class="word" id="vocabWord">Loading...</div>
            <button class="speaker-btn" onclick="event.stopPropagation(); speakWord(document.getElementById('vocabWord').textContent)" title="点击播放发音">🔊</button>
          </div>
          <div class="phonetic" id="vocabPhonetic"></div>
          <div class="example" id="vocabExample"></div>
          <div class="translation" id="vocabTranslation" style="display: none;"></div>
        </div>
        <div class="rating-btns">
          <button class="rating-btn rating-hard" onclick="rateWord('hard')">😓 难</button>
          <button class="rating-btn rating-medium" onclick="rateWord('medium')">😐 一般</button>
          <button class="rating-btn rating-easy" onclick="rateWord('easy')">😄 会了！</button>
        </div>
      </div>
    </div>

    <!-- 阅读页面 -->
    <div id="readingPage" class="page">
      <div class="module-header">
        <div class="module-back" onclick="goHome()">← 返回首页</div>
        <div class="module-title">阅读练习</div>
      </div>
      <div class="module-content" id="readingContent"></div>
    </div>

    <!-- 听力页面 -->
    <div id="listeningPage" class="page">
      <div class="module-header">
        <div class="module-back" onclick="goHome()">← 返回首页</div>
        <div class="module-title">听力练习</div>
      </div>
      <div class="module-content" id="listeningContent">
        <div style="text-align: center; padding: 40px; color: var(--text-light);">
          正在加载听力数据...
        </div>
      </div>
    </div>

    <!-- 写作页面 -->
    <div id="writingPage" class="page">
      <div class="module-header">
        <div class="module-back" onclick="goHome()">← 返回首页</div>
        <div class="module-title">写作练习</div>
      </div>
      <div class="module-content" id="writingContent"></div>
    </div>

    <!-- 进度页面 -->
    <div id="progressPage" class="page">
      <div class="hero">
        <div class="hero-name">学习进度</div>
      </div>
      <div class="home-content">
        <div class="section-title">技能掌握</div>
        <div class="progress-section">
          <div class="skill-progress">
            <div class="skill-icon">🔤</div>
            <div class="skill-info">
              <div class="skill-name">词汇</div>
              <div class="skill-bar">
                <div class="skill-fill" id="vocabSkillBar" style="width: 0%"></div>
              </div>
            </div>
            <div class="skill-percent" id="vocabSkillPercent">0%</div>
          </div>
          <div class="skill-progress">
            <div class="skill-icon">📖</div>
            <div class="skill-info">
              <div class="skill-name">阅读</div>
              <div class="skill-bar">
                <div class="skill-fill" id="readingSkillBar" style="width: 0%"></div>
              </div>
            </div>
            <div class="skill-percent" id="readingSkillPercent">0%</div>
          </div>
          <div class="skill-progress">
            <div class="skill-icon">🎧</div>
            <div class="skill-info">
              <div class="skill-name">听力</div>
              <div class="skill-bar">
                <div class="skill-fill" id="listeningSkillBar" style="width: 0%"></div>
              </div>
            </div>
            <div class="skill-percent" id="listeningSkillPercent">0%</div>
          </div>
          <div class="skill-progress">
            <div class="skill-icon">✍️</div>
            <div class="skill-info">
              <div class="skill-name">写作</div>
              <div class="skill-bar">
                <div class="skill-fill" id="writingSkillBar" style="width: 0%"></div>
              </div>
            </div>
            <div class="skill-percent" id="writingSkillPercent">0%</div>
          </div>
        </div>

        <div class="section-title">最近活动</div>
        <div class="progress-section" id="recentActivities">
          <div style="text-align: center; color: var(--text-light); padding: 20px;">
            暂无活动记录
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">首页</span>
    </div>
    <div class="nav-item" onclick="switchPage('progress')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">进度</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = 'https://ket-app-backend.onrender.com';
    let currentUser = null;
    let currentVocabIndex = 0;
    let isFlipped = false;
    let currentFilter = 'all';
    let currentListeningPage = 0;
    const LISTENING_PER_PAGE = 3;
    let listeningData = [];
    let currentReadingPage = 0;
    const READING_PER_PAGE = 3;
    let currentWritingPage = 0;
    const WRITING_PER_PAGE = 3;

    // KET词汇数据
    const vocabData = [
      // 日常生活 (40个)
      { word: 'morning', phonetic: '/ˈmɔːnɪŋ/', example: 'I have breakfast every morning.', translation: '早晨', category: '日常' },
      { word: 'evening', phonetic: '/ˈiːvnɪŋ/', example: 'We watch TV in the evening.', translation: '傍晚', category: '日常' },
      { word: 'night', phonetic: '/naɪt/', example: 'Good night! Sleep well.', translation: '夜晚', category: '日常' },
      { word: 'friend', phonetic: '/frend/', example: 'She is my best friend.', translation: '朋友', category: '日常' },
      { word: 'family', phonetic: '/ˈfæmɪli/', example: 'I love my family very much.', translation: '家庭', category: '日常' },
      { word: 'house', phonetic: '/haʊs/', example: 'This is my house.', translation: '房子', category: '日常' },
      { word: 'home', phonetic: '/həʊm/', example: 'I am going home now.', translation: '家', category: '日常' },
      { word: 'music', phonetic: '/ˈmjuːzɪk/', example: 'I like listening to music.', translation: '音乐', category: '日常' },
      { word: 'sport', phonetic: '/spɔːt/', example: 'Football is my favorite sport.', translation: '运动', category: '日常' },
      { word: 'game', phonetic: '/ɡeɪm/', example: 'Let\'s play a game together.', translation: '游戏', category: '日常' },
      { word: 'film', phonetic: '/fɪlm/', example: 'We watched a great film last night.', translation: '电影', category: '日常' },
      { word: 'phone', phonetic: '/fəʊn/', example: 'Can I use your phone?', translation: '电话/手机', category: '日常' },
      { word: 'money', phonetic: '/ˈmʌni/', example: 'I don\'t have enough money.', translation: '钱', category: '日常' },
      { word: 'time', phonetic: '/taɪm/', example: 'What time is it?', translation: '时间', category: '日常' },
      { word: 'day', phonetic: '/deɪ/', example: 'Have a nice day!', translation: '天/白天', category: '日常' },
      { word: 'week', phonetic: '/wiːk/', example: 'I go swimming once a week.', translation: '星期', category: '日常' },
      { word: 'birthday', phonetic: '/ˈbɜːθdeɪ/', example: 'Happy birthday to you!', translation: '生日', category: '日常' },
      { word: 'party', phonetic: '/ˈpɑːti/', example: 'She had a party last weekend.', translation: '派对', category: '日常' },
      { word: 'present', phonetic: '/ˈpreznt/', example: 'I gave her a birthday present.', translation: '礼物', category: '日常' },
      { word: 'letter', phonetic: '/ˈletə(r)/', example: 'I wrote a letter to my friend.', translation: '信', category: '日常' },
      { word: 'message', phonetic: '/ˈmesɪdʒ/', example: 'Did you get my message?', translation: '消息', category: '日常' },

        const res = await fetch(`${API_BASE}/api/vocab`);
        const json = await res.json();
        if (json.success) vocabData = json.data;
      } catch (e) {
        console.error('加载词汇数据失败', e);
      }
    }

    async function loadReadingData() {
      try {
        const res = await fetch(`${API_BASE}/api/reading`);
        const json = await res.json();
        if (json.success) readingData = json.data;
      } catch (e) {
        console.error('加载阅读数据失败', e);
      }
    }

    async function loadWritingData() {
      try {
        const res = await fetch(`${API_BASE}/api/writing`);
        const json = await res.json();
        if (json.success) writingData = json.data;
      } catch (e) {
        console.error('加载写作数据失败', e);
      }
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      checkLoggedIn();
      await Promise.all([loadVocabData(), loadReadingData(), loadWritingData()]);
      initVocabFilter();
      loadListeningData();
    });

    function checkLoggedIn() {
      const userStr = localStorage.getItem('ketUser');
      if (!userStr) {
        window.location.href = 'login.html';
        return;
      }
      currentUser = JSON.parse(userStr);
      updateUserUI();
      loadProgress();
    }

    function updateUserUI() {
      if (!currentUser) return;

      const hour = new Date().getHours();
      let greeting = '早上好';
      if (hour >= 12 && hour < 18) greeting = '下午好';
      if (hour >= 18) greeting = '晚上好';

      document.getElementById('greeting').textContent = greeting;
      document.getElementById('userName').textContent = currentUser.username;
      document.getElementById('navAvatar').textContent = currentUser.avatarEmoji || '😊';
    }

    function switchPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

      document.getElementById(page + 'Page').classList.add('active');
      event.currentTarget.classList.add('active');

      if (page === 'progress') {
        loadProgress();
      }
    }

    function showModule(module) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(module + 'Page').classList.add('active');

      if (module === 'vocab') {
        showVocabCard();
      } else if (module === 'reading') {
        renderReading();
      } else if (module === 'listening') {
        renderListening();
      } else if (module === 'writing') {
        renderWriting();
      }
    }

    function goHome() {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('homePage').classList.add('active');
      loadProgress();
    }

    function logout() {
      localStorage.removeItem('ketUser');
      window.location.href = 'login.html';
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // 词汇模块
    function initVocabFilter() {
      const categories = ['all', ...new Set(vocabData.map(v => v.category))];
      const filterHtml = categories.map(cat => `
        <div class="filter-chip ${cat === 'all' ? 'active' : ''}" onclick="filterVocab('${cat}')">
          ${cat === 'all' ? '全部' : cat}
        </div>
      `).join('');
      document.getElementById('vocabFilter').innerHTML = filterHtml;
    }

    function filterVocab(category) {
      currentFilter = category;
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.classList.toggle('active', chip.textContent === (category === 'all' ? '全部' : category));
      });
      currentVocabIndex = 0;
      showVocabCard();
    }

    function getFilteredVocab() {
      if (currentFilter === 'all') return vocabData;
      return vocabData.filter(v => v.category === currentFilter);
    }

    function showVocabCard() {
      const filtered = getFilteredVocab();
      if (currentVocabIndex >= filtered.length) currentVocabIndex = 0;

      const word = filtered[currentVocabIndex];
      document.getElementById('vocabWord').textContent = word.word;
      document.getElementById('vocabPhonetic').textContent = word.phonetic;
      document.getElementById('vocabExample').textContent = word.example;
      document.getElementById('vocabTranslation').textContent = word.translation;
      document.getElementById('vocabTranslation').style.display = 'none';
      isFlipped = false;
    }

    function speakWord(text) {
      if (!text) return;
      // 使用 Google 翻译发音引擎
      const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=en&client=gtx`;
      const audio = new Audio(url);
      audio.play().catch(e => {
        console.log('Google TTS 播放失败，尝试备用方案');
        // 备用：使用系统语音
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-GB';
        utterance.rate = 0.9;
        speechSynthesis.speak(utterance);
      });
    }

    function flipCard() {
      const word = document.getElementById('vocabWord').textContent;
      if (!isFlipped) speakWord(word);
      const transEl = document.getElementById('vocabTranslation');
      isFlipped = !isFlipped;
      transEl.style.display = isFlipped ? 'block' : 'none';
    }

    async function rateWord(rating) {
      const xp = rating === 'hard' ? 5 : rating === 'medium' ? 10 : 15;
      showToast(`+${xp} XP！`);

      try {
        await fetch(`${API_BASE}/api/vocab-progress`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: currentUser.id,
            word: vocabData[currentVocabIndex].word,
            rating
          })
        });
      } catch (err) {
        console.error('保存进度失败:', err);
      }

      currentVocabIndex++;
      showVocabCard();
      loadProgress();
    }

    // 阅读模块
    function renderReading() {
      const container = document.getElementById('readingContent');
      const totalPages = Math.ceil(readingData.length / READING_PER_PAGE);
      const start = currentReadingPage * READING_PER_PAGE;
      const pageItems = readingData.slice(start, start + READING_PER_PAGE);

      const html = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <span style="font-size:13px; color:var(--text-light);">共 ${readingData.length} 篇 · 第 ${currentReadingPage+1}/${totalPages} 页</span>
          <div style="display:flex;gap:8px;">
            <button onclick="changeReadingPage(-1)" ${currentReadingPage===0?'disabled':''} style="padding:6px 14px;border-radius:20px;border:1px solid #E2E8F0;background:${currentReadingPage===0?'#f0f0f0':'white'};cursor:${currentReadingPage===0?'not-allowed':'pointer'};font-size:13px;">上一页</button>
            <button onclick="changeReadingPage(1)" ${currentReadingPage===totalPages-1?'disabled':''} style="padding:6px 14px;border-radius:20px;border:1px solid #E2E8F0;background:${currentReadingPage===totalPages-1?'#f0f0f0':'white'};cursor:${currentReadingPage===totalPages-1?'not-allowed':'pointer'};font-size:13px;">下一页</button>
          </div>
        </div>
        ${pageItems.map((item, idx) => `
          <div class="reading-section">
            <div class="section-header">
              <span style="background:var(--primary);color:white;font-size:11px;padding:3px 10px;border-radius:12px;font-weight:700;">${item.part}</span>
              <span style="font-size:15px;font-weight:700;color:var(--text);margin-left:8px;">${item.title}</span>
            </div>
            <div class="reading-text">${item.text.replace(/\n/g, '<br>')}</div>
            <div style="margin-top:16px;font-weight:600;">${item.question}</div>
            <div style="margin-top:12px;">
              ${item.options.map((opt, i) => `
                <div class="reading-option" onclick="checkReadingAnswer(this, ${i}, ${item.answer})">
                  ${String.fromCharCode(65+i)}. ${opt}
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
        <div style="display:flex; justify-content:center; gap:8px; margin-top:16px;">
          <button onclick="changeReadingPage(-1)" ${currentReadingPage===0?'disabled':''} style="padding:8px 24px;border-radius:20px;border:1px solid #E2E8F0;background:${currentReadingPage===0?'#f0f0f0':'white'};cursor:${currentReadingPage===0?'not-allowed':'pointer'};">◀ 上一页</button>
          <button onclick="changeReadingPage(1)" ${currentReadingPage===totalPages-1?'disabled':''} style="padding:8px 24px;border-radius:20px;border:none;background:var(--primary);color:white;cursor:${currentReadingPage===totalPages-1?'not-allowed':'pointer'};">下一页 ▶</button>
        </div>
      `;
      container.innerHTML = html;
    }

    function changeReadingPage(dir) {
      const totalPages = Math.ceil(readingData.length / READING_PER_PAGE);
      currentReadingPage = Math.max(0, Math.min(totalPages - 1, currentReadingPage + dir));
      renderReading();
      document.getElementById('readingPage').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function checkReadingAnswer(el, selected, correct) {
      const parent = el.parentElement;
      parent.querySelectorAll('.reading-option').forEach(opt => {
        opt.classList.remove('selected');
        if (parseInt(opt.onclick.toString().match(/\d+/)[2]) === correct) {
          opt.classList.add('correct');
        }
      });

      if (selected === correct) {
        el.classList.add('selected');
        showToast('✅ 正确！+10 XP');
        saveProgress('reading', 10, true);
      } else {
        el.classList.add('wrong');
        showToast('❌ 再想想');
        saveProgress('reading', 0, false);
      }
    }

    // 加载听力数据
    async function loadListeningData() {
      try {
        console.log('开始加载听力数据...');
        const response = await fetch('audio/listening_data.json');
        console.log('响应状态:', response.status);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        listeningData = await response.json();
        console.log('听力数据加载成功，共', listeningData.length, '条');
      } catch (err) {
        console.error('加载听力数据失败:', err);
        listeningData = [];
        // 显示错误信息给用户
        setTimeout(() => {
          const container = document.getElementById('listeningContent');
          if (container) {
            container.innerHTML = `
              <div style="text-align: center; padding: 40px; color: #e74c3c;">
                ❌ 数据加载失败<br>
                <small style="color: #7f8c8d;">${err.message}</small><br>
                <button onclick="window.location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer;">刷新页面</button>
              </div>
            `;
          }
        }, 100);
      }
    }

    // 听力模块
    function renderListening() {
      const container = document.getElementById('listeningContent');

      if (listeningData.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--text-light);">
            正在加载听力数据...<br>请稍后刷新页面
          </div>
        `;
        return;
      }

      const totalPages = Math.ceil(listeningData.length / LISTENING_PER_PAGE);
      const startIndex = currentListeningPage * LISTENING_PER_PAGE;
      const endIndex = Math.min(startIndex + LISTENING_PER_PAGE, listeningData.length);
      const currentPageData = listeningData.slice(startIndex, endIndex);

      const html = currentPageData.map((item, displayIndex) => {
        const actualIndex = startIndex + displayIndex;
        return `
        <div class="reading-section">
          <div class="audio-player">
            <button class="play-btn" onclick="playListening(this, ${actualIndex})">▶</button>
            <div style="margin-top: 16px; font-weight: 600;">听力对话 ${actualIndex + 1}</div>
            <audio id="audio${actualIndex}" src="audio/listening${actualIndex + 1}.mp3" preload="auto"></audio>
          </div>
          <div style="margin-top: 12px;"><strong>${item.question}</strong></div>
          <div style="margin-top: 12px;">
            ${item.options.map((opt, i) => `
              <div class="reading-option" onclick="checkListeningAnswer(this, ${i}, ${item.answer})">
                ${String.fromCharCode(65 + i)}. ${opt}
              </div>
            `).join('')}
          </div>
          <button class="toggle-script-btn" onclick="this.nextElementSibling.classList.toggle('show')">查看原文 ▼</button>
          <div class="audio-script">${item.dialogue.replace(/\n/g, '<br>')}</div>
        </div>
      `}).join('');

      const paginationHtml = `
        <div class="pagination">
          <button class="page-btn" onclick="changeListeningPage(-1)" ${currentListeningPage === 0 ? 'disabled' : ''}>
            上一页
          </button>
          <span class="page-info">${currentListeningPage + 1} / ${totalPages}</span>
          <button class="page-btn" onclick="changeListeningPage(1)" ${currentListeningPage >= totalPages - 1 ? 'disabled' : ''}>
            下一页
          </button>
        </div>
      `;

      container.innerHTML = html + paginationHtml;
    }

    function changeListeningPage(delta) {
      currentListeningPage += delta;
      renderListening();
      window.scrollTo(0, 0);
    }

    function playListening(btn, index) {
      const audio = document.getElementById('audio' + index);

      if (btn.textContent === '⏸') {
        audio.pause();
        btn.textContent = '▶';
        return;
      }

      // 如果之前有其他音频在播放，先停止
      document.querySelectorAll('audio').forEach(a => {
        a.pause();
        a.currentTime = 0;
      });
      document.querySelectorAll('.play-btn').forEach(b => b.textContent = '▶');

      audio.play().then(() => {
        btn.textContent = '⏸';
        showToast('正在播放听力...');
      }).catch(err => {
        showToast('音频文件未找到');
        console.error('播放失败:', err);
      });

      audio.onended = () => {
        btn.textContent = '▶';
      };
    }

    function checkListeningAnswer(el, selected, correct) {
      const parent = el.parentElement;
      parent.querySelectorAll('.reading-option').forEach(opt => {
        opt.classList.remove('selected');
        if (parseInt(opt.onclick.toString().match(/\d+/)[2]) === correct) {
          opt.classList.add('correct');
        }
      });

      if (selected === correct) {
        el.classList.add('selected');
        showToast('✅ 正确！+10 XP');
        saveProgress('listening', 10, true);
      } else {
        el.classList.add('wrong');
        showToast('❌ 再想想');
        saveProgress('listening', 0, false);
      }
    }

    // 写作模块
    function renderWriting() {
      const container = document.getElementById('writingContent');
      const totalPages = Math.ceil(writingData.length / WRITING_PER_PAGE);
      const start = currentWritingPage * WRITING_PER_PAGE;
      const pageItems = writingData.slice(start, start + WRITING_PER_PAGE);

      // 写作类型颜色
      const typeColors = { '邮件': '#6C63FF', '便条': '#F7971E', '故事': '#43E97B', '描述': '#FF6584', '卡片': '#3498DB' };

      const html = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <span style="font-size:13px; color:var(--text-light);">共 ${writingData.length} 套 · 第 ${currentWritingPage+1}/${totalPages} 页</span>
          <div style="display:flex;gap:8px;">
            <button onclick="changeWritingPage(-1)" ${currentWritingPage===0?'disabled':''} style="padding:6px 14px;border-radius:20px;border:1px solid #E2E8F0;background:${currentWritingPage===0?'#f0f0f0':'white'};cursor:${currentWritingPage===0?'not-allowed':'pointer'};font-size:13px;">上一页</button>
            <button onclick="changeWritingPage(1)" ${currentWritingPage===totalPages-1?'disabled':''} style="padding:6px 14px;border-radius:20px;border:1px solid #E2E8F0;background:${currentWritingPage===totalPages-1?'#f0f0f0':'white'};cursor:${currentWritingPage===totalPages-1?'not-allowed':'pointer'};font-size:13px;">下一页</button>
          </div>
        </div>
        ${pageItems.map((item, idx) => {
          const globalIndex = start + idx;
          const bgColor = typeColors[item.type] || '#6C63FF';
          const tipsHtml = item.tips ? `
            <div style="background:#F0F4FF;border-radius:10px;padding:10px 14px;margin:10px 0;">
              <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:6px;">📝 写作要点：</div>
              ${item.tips.map(t => `<div style="font-size:12px;color:var(--text);margin:2px 0;">· ${t}</div>`).join('')}
            </div>
          ` : '';
          return `
            <div class="reading-section">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
                <span style="background:${bgColor};color:white;font-size:11px;padding:4px 12px;border-radius:12px;font-weight:700;">${item.type}</span>
                <span style="font-size:13px;color:var(--text-light);">练习 ${globalIndex+1}/${writingData.length}</span>
              </div>
              <div class="writing-prompt">
                <strong>题目：</strong>${item.prompt}
                <div style="font-size:12px;color:var(--text-light);margin-top:6px;">📏 要求：${item.wordMin} - ${item.wordMax} 词</div>
              </div>
              ${tipsHtml}
              <textarea class="writing-area" id="writingArea${globalIndex}" oninput="updateWordCount(this, ${item.wordMin}, ${item.wordMax}, ${globalIndex})" placeholder="在这里开始写作..."></textarea>
              <div class="word-count" id="wordCount${globalIndex}">0 词 / 要求 ${item.wordMin}-${item.wordMax} 词</div>
              <button style="width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:10px;font-weight:600;cursor:pointer;margin-top:12px;" onclick="submitWriting(${globalIndex})">提交 +15 XP</button>
              <div class="reference-answer" id="reference${globalIndex}" style="display:none;">
                <div class="reference-title">✅ 参考答案：</div>
                <div style="white-space:pre-wrap;font-size:13px;line-height:1.7;">${writingData[globalIndex].reference}</div>
              </div>
            </div>
          `;
        }).join('')}
        <div style="display:flex; justify-content:center; gap:8px; margin-top:16px;">
          <button onclick="changeWritingPage(-1)" ${currentWritingPage===0?'disabled':''} style="padding:8px 24px;border-radius:20px;border:1px solid #E2E8F0;background:${currentWritingPage===0?'#f0f0f0':'white'};cursor:${currentWritingPage===0?'not-allowed':'pointer'};">◀ 上一页</button>
          <button onclick="changeWritingPage(1)" ${currentWritingPage===totalPages-1?'disabled':''} style="padding:8px 24px;border-radius:20px;border:none;background:var(--primary);color:white;cursor:${currentWritingPage===totalPages-1?'not-allowed':'pointer'};">下一页 ▶</button>
        </div>
      `;
      container.innerHTML = html;
    }

    function changeWritingPage(dir) {
      const totalPages = Math.ceil(writingData.length / WRITING_PER_PAGE);
      currentWritingPage = Math.max(0, Math.min(totalPages - 1, currentWritingPage + dir));
      renderWriting();
      document.getElementById('writingPage').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function updateWordCount(textarea, min, max, index) {
      const words = textarea.value.trim().split(/\s+/).filter(w => w).length;
      const countEl = document.getElementById('wordCount' + index);
      const ok = words >= min && words <= max;
      countEl.textContent = `${words} 词 / 要求 ${min}-${max} 词 ${ok ? '✅' : ''}`;
      countEl.style.color = words === 0 ? '#718096' : (ok ? '#43A047' : '#F56565');
    }

    function submitWriting(index) {
      const area = document.getElementById('writingArea' + index);
      if (!area.value.trim()) {
        showToast('请先填写内容');
        return;
      }
      const refEl = document.getElementById('reference' + index);
      refEl.style.display = 'block';
      refEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      showToast('✅ 已提交！+15 XP');
      saveProgress('writing', 15, true);
    }

    // 进度模块
    async function loadProgress() {
      try {
        const res = await fetch(`${API_BASE}/api/user/${currentUser.id}/progress`);
        const data = await res.json();
        updateProgressUI(data);
      } catch (err) {
        console.error('加载进度失败:', err);
      }
    }

    function updateProgressUI(progress) {
      // 更新今日统计
      document.getElementById('todayWords').textContent = progress.today_words || 0;
      document.getElementById('todayXP').textContent = progress.today_xp || 0;
      document.getElementById('todayAccuracy').textContent = progress.accuracy ? Math.round(progress.accuracy) + '%' : '0%';
      document.getElementById('streakDisplay').textContent = `🔥 ${progress.streak || 0}天`;

      // 更新总体进度
      const overall = progress.overall || 0;
      document.getElementById('overallProgress').textContent = overall + '%';
      document.getElementById('progressFill').style.width = overall + '%';

      // 更新技能进度
      const skills = progress.skills || {};
      updateSkillBar('vocab', skills.vocab || 0);
      updateSkillBar('reading', skills.reading || 0);
      updateSkillBar('listening', skills.listening || 0);
      updateSkillBar('writing', skills.writing || 0);

      // 更新最近活动
      if (progress.recent && progress.recent.length > 0) {
        const activitiesHtml = progress.recent.slice(0, 10).map(act => `
          <div class="activity-item">
            <div class="activity-icon">${getActivityIcon(act.type)}</div>
            <div class="activity-info">
              <div class="activity-text">${act.text}</div>
              <div class="activity-time">${act.time}</div>
            </div>
            <div class="activity-xp">+${act.xp} XP</div>
          </div>
        `).join('');
        document.getElementById('recentActivities').innerHTML = activitiesHtml;
      }
    }

    function updateSkillBar(skill, percent) {
      document.getElementById(skill + 'SkillBar').style.width = percent + '%';
      document.getElementById(skill + 'SkillPercent').textContent = percent + '%';
    }

    function getActivityIcon(type) {
      const icons = {
        'vocab': '🔤',
        'reading': '📖',
        'listening': '🎧',
        'writing': '✍️'
      };
      return icons[type] || '⭐';
    }

    async function saveProgress(type, xp, correct) {
      try {
        await fetch(`${API_BASE}/api/${type}-progress`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: currentUser.id,
            xp,
            correct
          })
        });
        loadProgress();
      } catch (err) {
        console.error('保存进度失败:', err);
      }
    }
  </script>
</body>
</html>
